{
  "summary": "Check a CCGS Story",
  "description": "Calls doctor, evidence-validate, and closeout --dry-run through ccgs.cmd.",
  "lock": "",
  "kind": "script",
  "schema": {
    "$schema": "https://json-schema.org/draft/2020-12/schema",
    "type": "object",
    "order": [
      "framework_root",
      "project_root",
      "story",
      "evidence",
      "max_attempts",
      "retry_delay_seconds",
      "timeout_seconds"
    ],
    "properties": {
      "framework_root": {
        "type": "string",
        "description": "Mounted CCGS framework repository containing ccgs.cmd."
      },
      "project_root": {
        "type": "string",
        "description": "Explicit consumer project root mounted on the Windows worker."
      },
      "story": {
        "type": "string",
        "description": "Project-relative Story path under the configured production/epics tree."
      },
      "evidence": {
        "type": "string",
        "description": "Optional project-relative Evidence JSON path.",
        "default": ""
      },
      "max_attempts": {
        "type": "integer",
        "minimum": 1,
        "maximum": 5,
        "default": 3
      },
      "retry_delay_seconds": {
        "type": "number",
        "minimum": 0,
        "maximum": 60,
        "default": 1
      },
      "timeout_seconds": {
        "type": "number",
        "minimum": 1,
        "maximum": 3600,
        "default": 120
      }
    },
    "required": [
      "framework_root",
      "project_root",
      "story"
    ]
  }
}
